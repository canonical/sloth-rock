name: sloth
base: ubuntu@24.04
version: "0.16.0-dev"
summary: Petrified sloth, a Prometheus SLO generator.
description: |
    Sloth is an easy and simple Prometheus SLO (service level objectives) generator.
    It generates understandable, uniform and reliable Prometheus SLOs for any kind of service
    using a simple SLO spec.
platforms:
    amd64:
license: Apache-2.0

# Sloth CLI can be used in multiple modes:
# 1) sloth generate - one-time invocation to produce Prometheus recording rules from SLO specs.
# 2) sloth server   - long-running web server exposing the built-in UI (requires >= v0.16.0).
# 3) sloth kubernetes-controller - long-running K8s controller.

services:
  sloth:
    command: bin/sloth
    override: replace
    startup: enabled
    on-success: ignore
parts:
    sloth:
        plugin: go
        source: https://github.com/slok/sloth
        source-type: git
        source-commit: "3757b6607160646ce3a78114d077992663d5c9b7"
        source-depth: 1
        build-snaps:
        - go/1.25/candidate
        override-build: |
            CGO_ENABLED=0 go build -o "${CRAFT_PART_INSTALL}/bin/sloth" --ldflags "-s -w -extldflags '-static' -X github.com/slok/sloth/internal/info.Version=${CRAFT_PROJECT_VERSION}" -buildvcs=false ./cmd/sloth
        organize:
            bin/sloth: bin/sloth
    ca-certs:
        plugin: nil
        overlay-packages: [ca-certificates]
    deb-security-manifest:
        after:
        - sloth
        - ca-certs
        plugin: make
        source: https://github.com/canonical/rocks-security-manifest
        source-type: git
        source-branch: main
        override-prime: gen_manifest
